name: docker-build

# Build the all-callers image, functionally test every caller against the
# committed MitoHPC test data, and publish to GHCR (only after the smoke test
# passes, and only on main / tags — never on PRs).

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore: ["**/*.md"]
  pull_request:
    paths-ignore: ["**/*.md"]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write    # to commit refreshed example outputs back to main
  packages: write

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      # The image bundles 4 conda envs (R, BLAST, circos, MapSplice, ...); make
      # room on the runner before building.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: docker/setup-buildx-action@v3

      - name: Compute image name (lowercase)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # MitoHPC is our own repo and the reference caller; resolve the current tip
      # of its sv-calling branch so every build benchmarks the latest MitoHPC
      # (the SHA changes -> the MITOHPC_REF build-arg changes -> only the MitoHPC
      # image layer rebuilds). The exact commit is recorded at /opt/MitoHPC/GIT_SHA.
      - name: Resolve latest MitoHPC sv-calling commit
        id: mitohpc
        run: |
          REF="$(git ls-remote https://github.com/jlanej/MitoHPC sv-calling | cut -f1)"
          [[ -n "$REF" ]] || { echo "could not resolve MitoHPC sv-calling"; exit 1; }
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "MitoHPC sv-calling -> $REF"

      - name: Build image (load locally for testing)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          tags: mito-sv:ci
          build-args: |
            MITOHPC_REF=${{ steps.mitohpc.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Full scenario suite (all 10 mock BAMs + CRAM + real BAMs + degenerate
      # inputs) on main/tags; the quicker 3-sample subset on PRs to keep PR CI
      # snappy. Override locally with a 3rd arg: `bash test/smoke_test.sh IMG all quick`.
      - name: Functional smoke test (scenario cohort + comparison report)
        run: |
          SCOPE=full
          [[ "${{ github.event_name }}" == "pull_request" ]] && SCOPE=quick
          export MITO_SV_GENERATED="$(date -u +%Y-%m-%d) (${GITHUB_SHA::12})"
          bash test/smoke_test.sh mito-sv:ci all "$SCOPE"

      # Single LOD iteration (one tiny cell, both input arms) to prove the
      # limit-of-detection machinery runs end to end. The FULL sweep is the HPC
      # job (slurm/run_lod.sh).
      - name: LOD single-iteration gate
        run: bash test/lod_smoke.sh mito-sv:ci

      # Verbose per-caller logs + native tool intermediates for every sample
      # (written by the smoke test to test/_diagnostics). Uploaded even when the
      # smoke test failed, so a caller that ran-but-did-no-work can be inspected
      # under the hood. Retained 14 days.
      - name: Upload caller diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: caller-diagnostics
          path: test/_diagnostics
          retention-days: 14
          if-no-files-found: ignore

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag & push
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          IMG="${{ steps.img.outputs.name }}"
          SHA="${GITHUB_SHA::12}"
          docker tag mito-sv:ci "$IMG:latest"
          docker tag mito-sv:ci "$IMG:$SHA"
          docker push "$IMG:latest"
          docker push "$IMG:$SHA"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            docker tag mito-sv:ci "$IMG:${GITHUB_REF_NAME}"
            docker push "$IMG:${GITHUB_REF_NAME}"
          fi
          echo "Published $IMG:latest and $IMG:$SHA"

      # The smoke test wrote refreshed example outputs + SMOKE_SUMMARY.md to
      # test/example_output/ and the interactive comparison report to
      # docs/index.html. Commit them back so the repo always carries an
      # up-to-date view — even when the smoke test failed (a caller did not run),
      # so the broken state is visible. [skip ci] keeps this from triggering
      # another build. main-branch pushes only.
      - name: Commit example outputs + comparison report
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test/example_output docs
          if git diff --cached --quiet; then
            echo "No example-output / report changes to commit."
          else
            git commit -m "ci: refresh example outputs + comparison report [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}" \
              || echo "warn: could not push outputs (non-fatal)"
          fi
