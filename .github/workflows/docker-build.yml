name: docker-build

# Build the all-callers image, functionally test every caller against the
# committed MitoHPC test data, and publish to GHCR (only after the smoke test
# passes, and only on main / tags — never on PRs).

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore: ["**/*.md"]
  pull_request:
    paths-ignore: ["**/*.md"]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      # The image bundles 4 conda envs (R, BLAST, circos, MapSplice, ...); make
      # room on the runner before building.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: docker/setup-buildx-action@v3

      - name: Compute image name (lowercase)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build image (load locally for testing)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          tags: mito-sv:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Functional smoke test (all callers)
        run: bash test/smoke_test.sh mito-sv:ci

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag & push
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          IMG="${{ steps.img.outputs.name }}"
          SHA="${GITHUB_SHA::12}"
          docker tag mito-sv:ci "$IMG:latest"
          docker tag mito-sv:ci "$IMG:$SHA"
          docker push "$IMG:latest"
          docker push "$IMG:$SHA"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            docker tag mito-sv:ci "$IMG:${GITHUB_REF_NAME}"
            docker push "$IMG:${GITHUB_REF_NAME}"
          fi
          echo "Published $IMG:latest and $IMG:$SHA"
