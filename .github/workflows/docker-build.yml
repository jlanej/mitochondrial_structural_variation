name: docker-build

# Build the all-callers image, functionally test every caller against the
# committed MitoHPC test data, and publish to GHCR (only on main / tags, never on
# PRs). On main/tags the scenario cohort is FANNED OUT across a matrix of runner
# jobs (one shard per balanced subset of samples) and merged by a consolidate
# job; PRs run a quick single-job smoke.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore: ["**/*.md"]
  pull_request:
    paths-ignore: ["**/*.md"]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write    # to commit refreshed example outputs back to main
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build the image (cached), publish it, and plan the scenario shards.
  #    On PRs: just build + a quick single-job smoke (no publish, no matrix).
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    outputs:
      image: ${{ steps.img.outputs.name }}
      sha: ${{ steps.sha.outputs.short }}
      shards: ${{ steps.plan.outputs.shards }}
    steps:
      - uses: actions/checkout@v4

      # The image bundles 4 conda envs (R, BLAST, circos, MapSplice, ...); make
      # room on the runner before building.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: docker/setup-buildx-action@v3

      - name: Compute image name (lowercase)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      # MitoHPC is our own repo and the reference caller; resolve the current tip
      # of its sv-calling branch so every build benchmarks the latest MitoHPC
      # (the SHA changes -> the MITOHPC_REF build-arg changes -> only the MitoHPC
      # image layer rebuilds). The exact commit is recorded at /opt/MitoHPC/GIT_SHA.
      - name: Resolve latest MitoHPC sv-calling commit
        id: mitohpc
        run: |
          REF="$(git ls-remote https://github.com/jlanej/MitoHPC sv-calling | cut -f1)"
          [[ -n "$REF" ]] || { echo "could not resolve MitoHPC sv-calling"; exit 1; }
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "MitoHPC sv-calling -> $REF"

      - name: Build image (load locally for testing)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          tags: mito-sv:ci
          build-args: |
            MITOHPC_REF=${{ steps.mitohpc.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Single LOD iteration (one tiny cell, both input arms) to prove the
      # limit-of-detection machinery runs end to end. The FULL sweep is the HPC
      # job (slurm/run_lod.sh).
      - name: LOD single-iteration gate
        run: bash test/lod_smoke.sh mito-sv:ci

      # PRs: a quick 3-sample smoke in this single job (no publish / no matrix).
      - name: PR quick smoke
        if: github.event_name == 'pull_request'
        run: |
          export MITO_SV_GENERATED="$(date -u +%Y-%m-%d) (${GITHUB_SHA::12})"
          bash test/smoke_test.sh mito-sv:ci all quick

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publish so the matrix shards can pull the exact image by :sha.
      - name: Tag & push
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          IMG="${{ steps.img.outputs.name }}"
          SHA="${{ steps.sha.outputs.short }}"
          docker tag mito-sv:ci "$IMG:latest"
          docker tag mito-sv:ci "$IMG:$SHA"
          docker push "$IMG:latest"
          docker push "$IMG:$SHA"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            docker tag mito-sv:ci "$IMG:${GITHUB_REF_NAME}"
            docker push "$IMG:${GITHUB_REF_NAME}"
          fi
          echo "Published $IMG:latest and $IMG:$SHA"

      # Balanced scenario shards (LPT by depth) for the matrix. Change --shards to
      # trade parallelism for fewer runner jobs; --suite del runs deletions+controls
      # only (matches SUITE below — keep them in sync).
      - name: Plan scenario shards
        id: plan
        if: github.event_name != 'pull_request'
        run: |
          SHARDS="$(python3 test/plan_shards.py --truth test/data/truth.tsv --shards 6 --suite all)"
          echo "shards=$SHARDS" >> "$GITHUB_OUTPUT"
          echo "$SHARDS" | python3 -m json.tool

  # ---------------------------------------------------------------------------
  # 2. Run each shard's samples on its own runner (serial within a shard — the
  #    heavy callers don't OOM), then upload its raw outputs.
  # ---------------------------------------------------------------------------
  scenario:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.build.outputs.shards) }}
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with: { tool-cache: true, android: true, dotnet: true, large-packages: true, swap-storage: true }
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull image
        run: docker pull "${{ needs.build.outputs.image }}:${{ needs.build.outputs.sha }}"
      - name: Run shard ${{ matrix.shard.idx }}
        env:
          MITO_SV_RUN_ONLY: ${{ matrix.shard.samples }}
          MITO_SV_RUN_EXTRAS: ${{ matrix.shard.extras }}
          MITO_SV_OUT: ${{ github.workspace }}/shard_out
        run: |
          mkdir -p "$MITO_SV_OUT"
          bash test/smoke_test.sh "${{ needs.build.outputs.image }}:${{ needs.build.outputs.sha }}" all full all
      - name: Upload shard outputs
        uses: actions/upload-artifact@v4
        with:
          name: cohort-shard-${{ matrix.shard.idx }}
          path: shard_out
          retention-days: 3
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # 3. Merge all shard outputs, post-process + gate + build the report + commit.
  #    Pure host-side (the post-process/report tools are stdlib) — no image.
  # ---------------------------------------------------------------------------
  consolidate:
    needs: [build, scenario]
    if: ${{ always() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Download shard outputs
        uses: actions/download-artifact@v4
        with:
          pattern: cohort-shard-*
          path: _artifacts
      - name: Merge shard outputs
        run: |
          mkdir -p merged_out
          for d in _artifacts/cohort-shard-*; do
            [ -d "$d" ] || continue
            # upload-artifact may or may not keep the leading shard_out/ dir.
            src="$d"; [ -d "$d/shard_out" ] && src="$d/shard_out"
            cp -a "$src"/. merged_out/ 2>/dev/null || true
          done
          echo "merged $(find merged_out -mindepth 1 -maxdepth 1 -type d | wc -l) sample dir(s)"
          find merged_out -mindepth 1 -maxdepth 1 -type d -printf '  %f\n' | sort | head -40
      - name: Consolidate (post-process + gate + report)
        env:
          MITO_SV_MERGED_OUT: ${{ github.workspace }}/merged_out
        run: |
          export MITO_SV_GENERATED="$(date -u +%Y-%m-%d) (${GITHUB_SHA::12})"
          bash test/smoke_test.sh "${{ needs.build.outputs.image }}:${{ needs.build.outputs.sha }}" all full all
      - name: Upload caller diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: caller-diagnostics
          path: test/_diagnostics
          retention-days: 14
          if-no-files-found: ignore
      - name: Commit example outputs + comparison report
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test/example_output docs
          if git diff --cached --quiet; then
            echo "No example-output / report changes to commit."
          else
            git commit -m "ci: refresh example outputs + comparison report [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}" \
              || echo "warn: could not push outputs (non-fatal)"
          fi
