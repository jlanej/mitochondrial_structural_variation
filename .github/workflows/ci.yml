name: ci

# Fast checks that need no Docker image: parser unit tests, shell + python
# syntax. The heavy build/functional test lives in docker-build.yml.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parser unit tests
        run: python3 test/test_parsers.py

      - name: SV-evaluation kernel unit tests
        run: python3 test/test_sv_eval.py

      - name: Scenario-evaluator unit tests
        run: python3 test/test_check_scenarios.py

      - name: LOD statistics unit tests
        run: python3 test/test_lod_stats.py

      - name: Shard-planner unit tests
        run: python3 test/test_plan_shards.py

      - name: Score-cell unit tests
        run: python3 test/test_score_cell.py

      - name: MitoBreak matcher unit tests
        run: python3 test/test_mitobreak.py

      - name: Cohort-report unit tests
        run: python3 test/test_cohort_report.py

      - name: Post-process CLI smoke (no Docker)
        run: |
          python3 -c "import ast,sys; ast.parse(open('pipeline/postprocess.py').read())"
          python3 pipeline/postprocess.py --help >/dev/null
          python3 pipeline/cohort_report.py --help >/dev/null
          python3 test/check_scenarios.py --help >/dev/null
          python3 pipeline/lod/make_lod_report.py --help >/dev/null
          python3 pipeline/lod/analyze_lod.py --help >/dev/null

      - name: Python syntax (compile all)
        run: |
          python3 -m py_compile pipeline/postprocess.py pipeline/make_report.py \
            pipeline/cohort_report.py pipeline/lib/parsers.py pipeline/lib/sv_eval.py \
            pipeline/lib/mitobreak.py \
            pipeline/lod/lod_stats.py pipeline/lod/analyze_lod.py \
            pipeline/lod/gen_cell.py pipeline/lod/score_cell.py pipeline/lod/make_lod_report.py \
            test/test_parsers.py test/check_scenarios.py test/test_check_scenarios.py \
            test/test_sv_eval.py test/test_lod_stats.py \
            test/plan_shards.py test/test_plan_shards.py test/test_score_cell.py \
            test/test_mitobreak.py test/test_cohort_report.py

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shell syntax check (bash -n)
        run: |
          set -e
          while IFS= read -r f; do echo "bash -n $f"; bash -n "$f"; done < <(
            find pipeline slurm test -name '*.sh' -o -name '*.sbatch' | sort)

      - name: Shellcheck (errors only)
        run: |
          shellcheck --severity=error --shell=bash \
            pipeline/*.sh pipeline/callers/*.sh test/*.sh slurm/*.sh slurm/*.sbatch
